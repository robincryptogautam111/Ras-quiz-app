<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#070d1f" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#fafafc" media="(prefers-color-scheme: light)"/>
  <meta name="description" content="RAS Arena — India's premium edtech platform for RAS, REET, SSC, UPSC and Banking aspirants. Daily quizzes, mock tests, and AI-powered analytics."/>
  <meta name="format-detection" content="telephone=no"/>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="%23142142"/><path d="M22 22h14a8 8 0 0 1 0 16h-6l8 8h-7l-8-8h-1v8h-6V22h6zm6 6v6h8a3 3 0 0 0 0-6h-8z" fill="%23ffb020"/></svg>'/>
  <title>RAS Arena — India's Smartest Quiz Platform</title>
  <!-- Anti-flash dark/light boot — runs before React paints -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem('ras_theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var dark = s === 'dark' || (s !== 'light' && !prefersLight);
        if (dark) document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
  <!-- Razorpay SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
